services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=otp
      - POSTGRES_PASSWORD=otp
      - POSTGRES_DB=otp
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
