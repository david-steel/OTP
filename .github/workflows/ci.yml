name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      # Dead-code report (knip). Non-blocking for now: ~100 unused exports/types
      # need a deliberate triage pass before this can gate. It still annotates so
      # the debt stays visible. TODO: triage, then drop continue-on-error.
      - name: Dead code (knip, non-blocking)
        run: npm run knip
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: otp
          POSTGRES_PASSWORD: otp
          POSTGRES_DB: otp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # The integration tests self-provision an in-process Postgres (pglite),
      # so the postgres service above is a fallback for any test that reads
      # DATABASE_URL directly. NODE_ENV=test enables the dev-only auth paths.
      - run: npm test
        env:
          DATABASE_URL: postgresql://otp:otp@localhost:5432/otp_test
          NODE_ENV: test

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker image
        run: docker build -t otp-platform .
      - name: Verify image
        run: docker run --rm otp-platform node -e "console.log('Docker OK')"
