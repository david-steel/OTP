# -----------------------------------------------------------------------------
# FAQ  (the real questions buyers and their lawyers ask)
# -----------------------------------------------------------------------------
faqs:
  - question: If I publish to OTP, who can see my data?
    answer: >-
      By default, nothing. Your operating data stays private to your
      organization. Only items you explicitly publish (learnings, selected best
      practices, or a profile/KPIs you mark public) appear on the network. See
      the Network Boundary section above.
  - question: Is my operational data (priorities, KPIs, meetings) ever shared?
    answer: >-
      No. Those are private to your organization and never appear on any
      cross-org surface.
  - question: Can I keep my whole organization off the network?
    answer: >-
      Yes. A private organization is hard-excluded from every cross-org surface
      through a single enforced control.
  - question: Where is my data stored?
    answer: >-
      In the EU, in Railway's Amsterdam region, encrypted at rest, with daily
      encrypted backups retained 30 days.
  - question: Do you use my data to train AI models?
    answer: >-
      No. AI features send only the content needed for that request to
      Anthropic's Claude API to generate your response, and Anthropic does not
      train on data submitted through its paid API.
  - question: Can I delete or export my data?
    answer: >-
      Yes. On a verified deletion request, personal data is permanently removed
      within 7 days. You can request a copy of your data; a self-serve export is
      on the roadmap.
  - question: Are you SOC 2 or GDPR compliant?
    answer: >-
      We are pre-SOC 2 and targeting SOC 2 Type II within six months; our
      infrastructure already runs on SOC 2 Type II, HIPAA-compliant Railway. For
      GDPR, customer data is hosted in the EU and a DPA is available on request.

