<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">The System Boundary Problem</title>
  <desc id="desc">A diagram showing business software systems as bounded modules with OTP above them as the organizational intelligence layer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef1f5"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#1477ee"/>
      <stop offset="1" stop-color="#0f63d8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <g opacity="0.5" stroke="#dbe1ea" stroke-width="1">
    <path d="M80 145H1120M80 245H1120M80 345H1120M80 445H1120M80 545H1120M80 645H1120"/>
    <path d="M180 80V690M360 80V690M540 80V690M720 80V690M900 80V690M1080 80V690"/>
  </g>
  <text x="80" y="92" fill="#11141d" font-size="42" font-family="Inter, Arial, sans-serif" font-weight="800">The System Boundary Problem</text>
  <text x="80" y="132" fill="#616b7d" font-size="20" font-family="Inter, Arial, sans-serif">Every tool answers the question it was built to answer. The learning question sits above the stack.</text>

  <g transform="translate(110 182)" font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <rect x="0" y="0" width="980" height="108" rx="8" fill="url(#blue)"/>
    <text x="34" y="45" fill="#ffffff" font-size="18" font-weight="800" letter-spacing="3">OTP</text>
    <text x="34" y="78" fill="#ffffff" font-size="30" font-weight="800">Organizational Intelligence Layer</text>
    <text x="640" y="52" fill="rgba(255,255,255,0.82)" font-size="18">What did we learn?</text>
    <text x="640" y="80" fill="rgba(255,255,255,0.82)" font-size="18">Who owns what changes next?</text>
  </g>

  <g transform="translate(110 344)" font-family="Inter, Arial, sans-serif">
    <g stroke="#1477ee" stroke-width="3" fill="none" opacity="0.86">
      <path d="M98 -54V0"/>
      <path d="M294 -54V0"/>
      <path d="M490 -54V0"/>
      <path d="M686 -54V0"/>
      <path d="M882 -54V0"/>
    </g>

    <g filter="url(#shadow)">
      <g>
        <rect width="176" height="250" rx="8" fill="#ffffff" stroke="#dbe1ea"/>
        <text x="22" y="44" fill="#1477ee" font-size="18" font-weight="800">CRM</text>
        <text x="22" y="82" fill="#11141d" font-size="24" font-weight="800">Customer</text>
        <text x="22" y="112" fill="#11141d" font-size="24" font-weight="800">record</text>
        <text x="22" y="166" fill="#616b7d" font-size="16">Who is the</text>
        <text x="22" y="188" fill="#616b7d" font-size="16">customer?</text>
        <rect x="22" y="210" width="132" height="10" rx="5" fill="#dbe1ea"/>
      </g>
      <g transform="translate(196 0)">
        <rect width="176" height="250" rx="8" fill="#ffffff" stroke="#dbe1ea"/>
        <text x="22" y="44" fill="#1477ee" font-size="18" font-weight="800">PM</text>
        <text x="22" y="82" fill="#11141d" font-size="24" font-weight="800">Task</text>
        <text x="22" y="112" fill="#11141d" font-size="24" font-weight="800">record</text>
        <text x="22" y="166" fill="#616b7d" font-size="16">What is the</text>
        <text x="22" y="188" fill="#616b7d" font-size="16">task?</text>
        <rect x="22" y="210" width="132" height="10" rx="5" fill="#dbe1ea"/>
      </g>
      <g transform="translate(392 0)">
        <rect width="176" height="250" rx="8" fill="#ffffff" stroke="#dbe1ea"/>
        <text x="22" y="44" fill="#1477ee" font-size="18" font-weight="800">BI</text>
        <text x="22" y="82" fill="#11141d" font-size="24" font-weight="800">Metric</text>
        <text x="22" y="112" fill="#11141d" font-size="24" font-weight="800">record</text>
        <text x="22" y="166" fill="#616b7d" font-size="16">What</text>
        <text x="22" y="188" fill="#616b7d" font-size="16">moved?</text>
        <rect x="22" y="210" width="132" height="10" rx="5" fill="#dbe1ea"/>
      </g>
      <g transform="translate(588 0)">
        <rect width="176" height="250" rx="8" fill="#ffffff" stroke="#dbe1ea"/>
        <text x="22" y="44" fill="#1477ee" font-size="18" font-weight="800">DOCS</text>
        <text x="22" y="82" fill="#11141d" font-size="24" font-weight="800">File</text>
        <text x="22" y="112" fill="#11141d" font-size="24" font-weight="800">record</text>
        <text x="22" y="166" fill="#616b7d" font-size="16">What was</text>
        <text x="22" y="188" fill="#616b7d" font-size="16">written?</text>
        <rect x="22" y="210" width="132" height="10" rx="5" fill="#dbe1ea"/>
      </g>
      <g transform="translate(784 0)">
        <rect width="176" height="250" rx="8" fill="#ffffff" stroke="#dbe1ea"/>
        <text x="22" y="44" fill="#1477ee" font-size="18" font-weight="800">CHAT</text>
        <text x="22" y="82" fill="#11141d" font-size="24" font-weight="800">Conversation</text>
        <text x="22" y="112" fill="#11141d" font-size="24" font-weight="800">record</text>
        <text x="22" y="166" fill="#616b7d" font-size="16">What was</text>
        <text x="22" y="188" fill="#616b7d" font-size="16">said?</text>
        <rect x="22" y="210" width="132" height="10" rx="5" fill="#dbe1ea"/>
      </g>
    </g>
  </g>

  <g transform="translate(186 664)" font-family="Inter, Arial, sans-serif">
    <rect width="828" height="1" fill="#dbe1ea"/>
    <text x="0" y="35" fill="#616b7d" font-size="18">The tool boundary is not a defect. It is why the company needs an intelligence layer above the stack.</text>
  </g>
</svg>
