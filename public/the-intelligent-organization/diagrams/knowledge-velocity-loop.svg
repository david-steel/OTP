<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">The Knowledge Velocity Model</title>
  <desc id="desc">A seven step loop from observing work to improving the system.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef1f5"/>
    </linearGradient>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#1477ee"/>
      <stop offset="1" stop-color="#0f63d8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="80" y="92" fill="#11141d" font-size="40" font-family="Inter, Arial, sans-serif" font-weight="700">The Knowledge Velocity Model</text>
  <text x="80" y="130" fill="#616b7d" font-size="20" font-family="Inter, Arial, sans-serif">Learning is not complete until the system behaves differently.</text>
  <g transform="translate(600 405)" font-family="Inter, Arial, sans-serif">
    <circle r="230" fill="rgba(20,119,238,0.04)" stroke="#dbe1ea" stroke-width="2"/>
    <circle r="100" fill="rgba(20,119,238,0.10)" stroke="url(#g)" stroke-width="3"/>
    <text y="-10" text-anchor="middle" fill="#1477ee" font-size="18" font-weight="700">Company</text>
    <text y="30" text-anchor="middle" fill="#11141d" font-size="30" font-weight="760">Learning Loop</text>
    <g fill="#ffffff" stroke="#c8d2df">
      <rect x="-70" y="-310" width="140" height="58" rx="8"/>
      <rect x="138" y="-220" width="154" height="58" rx="8"/>
      <rect x="188" y="0" width="168" height="58" rx="8"/>
      <rect x="74" y="202" width="154" height="58" rx="8"/>
      <rect x="-228" y="202" width="154" height="58" rx="8"/>
      <rect x="-356" y="0" width="168" height="58" rx="8"/>
      <rect x="-292" y="-220" width="154" height="58" rx="8"/>
    </g>
    <g fill="#11141d" font-size="17" font-weight="700">
      <text x="0" y="-274" text-anchor="middle">Observe</text>
      <text x="215" y="-184" text-anchor="middle">Capture</text>
      <text x="272" y="36" text-anchor="middle">Assign</text>
      <text x="151" y="238" text-anchor="middle">Link KPI</text>
      <text x="-151" y="238" text-anchor="middle">Track</text>
      <text x="-272" y="36" text-anchor="middle">Remember</text>
      <text x="-215" y="-184" text-anchor="middle">Improve</text>
    </g>
    <path d="M0-252C180-240 298-112 300 0C306 172 164 284 0 288C-168 292-304 176-302 0C-300-144-174-240 0-252Z" fill="none" stroke="url(#g)" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
