<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">The Forgetting Tax</title>
  <desc id="desc">A layered cost stack showing how rediscovery, translation, handoff, decision decay, and pattern blindness compound into strategic drag.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef1f5"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1">
      <stop offset="0" stop-color="#ff7a14"/>
      <stop offset="1" stop-color="#f55f00"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#1477ee"/>
      <stop offset="1" stop-color="#0f63d8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <g opacity="0.52" stroke="#dbe1ea" stroke-width="1">
    <path d="M80 145H1120M80 245H1120M80 345H1120M80 445H1120M80 545H1120M80 645H1120"/>
    <path d="M180 80V690M360 80V690M540 80V690M720 80V690M900 80V690M1080 80V690"/>
  </g>
  <text x="80" y="92" fill="#11141d" font-size="42" font-family="Inter, Arial, sans-serif" font-weight="800">The Forgetting Tax</text>
  <text x="80" y="132" fill="#616b7d" font-size="20" font-family="Inter, Arial, sans-serif">A hidden cost stack that compounds when lessons stay personal.</text>

  <g transform="translate(108 186)" font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <rect x="0" y="0" width="660" height="82" rx="8" fill="#ffffff" stroke="#dbe1ea"/>
    <rect x="0" y="96" width="710" height="82" rx="8" fill="#ffffff" stroke="#dbe1ea"/>
    <rect x="0" y="192" width="760" height="82" rx="8" fill="#ffffff" stroke="#dbe1ea"/>
    <rect x="0" y="288" width="810" height="82" rx="8" fill="#ffffff" stroke="#dbe1ea"/>
    <rect x="0" y="384" width="860" height="82" rx="8" fill="#fff7ed" stroke="#ff7a14" stroke-width="2"/>

    <g font-size="18" font-weight="800">
      <text x="30" y="50" fill="#1477ee">01</text>
      <text x="30" y="146" fill="#1477ee">02</text>
      <text x="30" y="242" fill="#1477ee">03</text>
      <text x="30" y="338" fill="#1477ee">04</text>
      <text x="30" y="434" fill="#ff7a14">05</text>
    </g>
    <g font-size="26" font-weight="800" fill="#11141d">
      <text x="92" y="49">Rediscovery cost</text>
      <text x="92" y="145">Translation cost</text>
      <text x="92" y="241">Handoff cost</text>
      <text x="92" y="337">Decision decay</text>
      <text x="92" y="433">Pattern blindness</text>
    </g>
    <g font-size="18" fill="#616b7d">
      <text x="380" y="50">Solve it again</text>
      <text x="380" y="146">Explain context again</text>
      <text x="380" y="242">Slow every boundary</text>
      <text x="380" y="338">Lose the reason</text>
      <text x="380" y="434">Miss the repeat pattern</text>
    </g>
  </g>

  <g transform="translate(850 208)" font-family="Inter, Arial, sans-serif">
    <path d="M24 0V342" stroke="url(#orange)" stroke-width="10" stroke-linecap="round"/>
    <path d="M24 342l-42-48h84Z" fill="#ff7a14"/>
    <circle cx="122" cy="64" r="48" fill="rgba(20,119,238,0.10)" stroke="#1477ee" stroke-width="3"/>
    <circle cx="122" cy="176" r="48" fill="rgba(183,239,24,0.18)" stroke="#5c9014" stroke-width="3"/>
    <circle cx="122" cy="288" r="48" fill="rgba(255,122,20,0.14)" stroke="#ff7a14" stroke-width="3"/>
    <text x="122" y="58" text-anchor="middle" fill="#1477ee" font-size="15" font-weight="800">MORE</text>
    <text x="122" y="80" text-anchor="middle" fill="#11141d" font-size="20" font-weight="800">work</text>
    <text x="122" y="170" text-anchor="middle" fill="#5c9014" font-size="15" font-weight="800">MORE</text>
    <text x="122" y="192" text-anchor="middle" fill="#11141d" font-size="20" font-weight="800">delay</text>
    <text x="122" y="282" text-anchor="middle" fill="#ff7a14" font-size="15" font-weight="800">MORE</text>
    <text x="122" y="304" text-anchor="middle" fill="#11141d" font-size="20" font-weight="800">drag</text>
  </g>

  <g transform="translate(108 680)" font-family="Inter, Arial, sans-serif">
    <rect width="984" height="1" fill="#dbe1ea"/>
    <text x="0" y="34" fill="#616b7d" font-size="18">The company does not forget all at once. It forgets one handoff at a time.</text>
  </g>
</svg>
