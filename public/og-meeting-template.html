<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OTP Meeting OG Card</title>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800&f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f5f7f3;
      --brand: #5C8A3C;       /* Swamp Green — accent on light */
      --brand-deep: #4d7a2e;
      --pop: #A6E22E;         /* Lime Pop — pills, dots, ribbon */
      --pop-text: #0F1B14;
      --ink: #16241b;         /* near-swamp dark text */
      --muted: #5d6b60;
      --line: #d9e2da;
      --chip-bg: #f2f5f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'General Sans', -apple-system, sans-serif;
      position: relative;
      display: flex;
      align-items: center;
    }

    /* faint green life behind the mascot so white isn't sterile */
    .bg-glow {
      position: absolute; inset: 0;
      background: radial-gradient(820px 660px at 27% 54%, rgba(166,226,46,0.16) 0%, rgba(92,138,60,0.06) 40%, rgba(255,255,255,0) 66%);
      pointer-events: none;
    }
    /* light dotted grid */
    .grid-bg {
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(22,36,27,0.07) 1.3px, transparent 1.3px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    .mascot {
      position: relative;
      width: 480px; height: 480px;
      margin-left: 48px;
      flex-shrink: 0;
      object-fit: contain;
      filter: drop-shadow(0 20px 40px rgba(22,36,27,0.16));
    }

    .col {
      position: relative;
      flex: 1;
      padding: 0 76px 0 26px;
      display: flex; flex-direction: column;
    }

    .pill {
      align-self: flex-start;
      display: inline-flex; align-items: center; gap: 9px;
      background: var(--pop);
      color: var(--pop-text);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700; font-size: 14px;
      letter-spacing: 0.14em; text-transform: uppercase;
      padding: 8px 15px; border-radius: 999px;
    }
    .pill .play { width: 0; height: 0; border-left: 8px solid var(--pop-text); border-top: 5px solid transparent; border-bottom: 5px solid transparent; }

    .wordmark {
      margin-top: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700; font-size: 20px;
      letter-spacing: 0.1em; color: var(--muted);
    }

    .headline {
      margin-top: 10px;
      font-family: 'Cabinet Grotesk', sans-serif;
      font-weight: 800; font-size: 60px;
      line-height: 1.04; letter-spacing: -0.025em;
      color: var(--ink);
    }
    .headline .accent { color: var(--brand); }

    .subhead {
      margin-top: 22px;
      font-family: 'General Sans', sans-serif;
      font-weight: 500; font-size: 21px;
      line-height: 1.45; color: var(--muted);
      max-width: 540px;
    }

    .chips { margin-top: 28px; display: flex; flex-wrap: wrap; gap: 9px; }
    .chip {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500; font-size: 13.5px;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--ink);
      background: var(--chip-bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 13px;
      display: flex; align-items: center; gap: 8px;
    }
    .chip .d { width: 7px; height: 7px; border-radius: 50%; background: var(--brand); box-shadow: 0 0 8px rgba(92,138,60,0.45); }

    .footer {
      position: absolute; bottom: 42px; right: 76px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700; font-size: 16px;
      letter-spacing: 0.06em; color: var(--muted);
    }
    .ribbon { position: absolute; left: 0; bottom: 0; width: 100%; height: 5px; background: var(--pop); }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="grid-bg"></div>

  <img class="mascot" src="/images/onboarding-orgy-meeting.png" alt="">

  <div class="col">
    <div class="pill"><span class="play"></span>L8 Leadership Meeting</div>

    <div class="wordmark">OTP</div>

    <h1 class="headline">
      Everyone aligned.<br>
      <span class="accent">Nothing dropped.</span>
    </h1>

    <p class="subhead">Where the humans you have and the agents you build run the week together.</p>

    <div class="chips">
      <div class="chip"><span class="d"></span>Scorecard</div>
      <div class="chip"><span class="d"></span>Rocks</div>
      <div class="chip"><span class="d"></span>IDS</div>
      <div class="chip"><span class="d"></span>To-Dos</div>
    </div>
  </div>

  <div class="footer">orgtp.com</div>
  <div class="ribbon"></div>
</body>
</html>
